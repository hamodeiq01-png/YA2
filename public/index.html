<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اقرأ | تسجيل الدخول</title>
  <link rel="icon" type="image/jpeg" href="favicon.jpeg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header>
    <div class="nav-container">
      <a href="#" class="logo">
        <img src="favicon.jpeg" alt="اقرأ" class="logo-icon" style="width:36px;height:36px;border-radius:50%;object-fit:cover;">
        <span>اقرأ</span>
      </a>
    </div>
  </header>

  <!-- Main Content -->
  <main class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <h2>أهلاً بك في منصة اقرأ</h2>
        <p>تابع ورد قراءتك اليومي وارتقِ بمعرفتك</p>
      </div>

      <div id="authAlert" class="alert"></div>

      <!-- Tab Buttons -->
      <div class="tabs">
        <button id="tabLogin" class="tab-btn active" onclick="switchTab('login')">تسجيل الدخول</button>
        <button id="tabRegister" class="tab-btn" onclick="switchTab('register')">تسجيل معلم جديد</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="loginUsername">اسم المستخدم</label>
          <input type="text" id="loginUsername" class="form-control" placeholder="أدخل اسم المستخدم" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="loginPassword">كلمة المرور</label>
          <input type="password" id="loginPassword" class="form-control" placeholder="أدخل كلمة المرور" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary">دخول للمنصة</button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" onsubmit="handleRegister(event)" style="display: none;">
        <div class="form-group">
          <label for="regFullName">الاسم الكامل للمعلم</label>
          <input type="text" id="regFullName" class="form-control" placeholder="مثال: أ. محمد أحمد" required autocomplete="name">
        </div>
        <div class="form-group">
          <label for="regUsername">اسم المستخدم (بالأحرف أو الأرقام)</label>
          <input type="text" id="regUsername" class="form-control" placeholder="اختر اسم مستخدم فريد" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="regPassword">كلمة المرور</label>
          <input type="password" id="regPassword" class="form-control" placeholder="اختر كلمة مرور قوية" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary">إنشاء حساب المعلم</button>
      </form>
    </div>
  </main>

  <script src="js/auth.js"></script>
  <script>
    // Redirect if already logged in
    window.addEventListener('DOMContentLoaded', () => {
      const user = getUser();
      if (user) {
        if (user.role === 'teacher') {
          window.location.href = 'teacher.html';
        } else if (user.role === 'student') {
          window.location.href = 'student.html';
        }
      }
    });

    let currentTab = 'login';

    function switchTab(tab) {
      currentTab = tab;
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');
      const tabLogin = document.getElementById('tabLogin');
      const tabRegister = document.getElementById('tabRegister');
      const authAlert = document.getElementById('authAlert');

      authAlert.style.display = 'none';

      if (tab === 'login') {
        loginForm.style.display = 'block';
        registerForm.style.display = 'none';
        tabLogin.classList.add('active');
        tabRegister.classList.remove('active');
      } else {
        loginForm.style.display = 'none';
        registerForm.style.display = 'block';
        tabLogin.classList.remove('active');
        tabRegister.classList.add('active');
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('loginUsername').value;
      const password = document.getElementById('loginPassword').value;

      try {
        const response = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'فشل تسجيل الدخول');
        }

        setSession(data.token, data.user);
        
        if (data.user.role === 'teacher') {
          window.location.href = 'teacher.html';
        } else {
          window.location.href = 'student.html';
        }
      } catch (error) {
        showAlert('authAlert', error.message, 'danger');
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const fullName = document.getElementById('regFullName').value;
      const username = document.getElementById('regUsername').value;
      const password = document.getElementById('regPassword').value;

      try {
        const response = await fetch(`${API_BASE}/auth/register-teacher`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fullName, username, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'فشل إنشاء الحساب');
        }

        showAlert('authAlert', 'تم تسجيل حساب المعلم بنجاح! يمكنك الآن تسجيل الدخول.', 'success');
        switchTab('login');
        
        // Auto fill username for convenience
        document.getElementById('loginUsername').value = username;
      } catch (error) {
        showAlert('authAlert', error.message, 'danger');
      }
    }
  </script>
</body>
</html>
