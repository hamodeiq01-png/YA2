<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة تحكم الطالب | اقرأ</title>
  <link rel="icon" type="image/jpeg" href="favicon.jpeg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header>
    <div class="nav-container">
      <a href="student.html" class="logo">
        <img src="favicon.jpeg" alt="اقرأ" class="logo-icon" style="width:36px;height:36px;border-radius:50%;object-fit:cover;">
        <span>اقرأ | لوحة الطالب</span>
      </a>
      <div class="user-nav-info">
        <span class="user-badge" id="studentName">الطالب</span>
        <button onclick="logout()" class="btn btn-secondary" style="width: auto; padding: 8px 16px;">تسجيل الخروج</button>
      </div>
    </div>
  </header>

  <!-- Main Container -->
  <main class="container">
    <div id="studentAlert" class="alert"></div>

    <!-- بطاقة النقاط التحفيزية -->
    <div class="points-hero-card" id="pointsHeroCard">
      <div class="points-hero-content">
        <div class="points-hero-icon">⭐</div>
        <div class="points-hero-info">
          <div class="points-hero-label">نقاطك الإجمالية</div>
          <div class="points-hero-value" id="studentPointsValue">0</div>
        </div>
      </div>
      <div class="points-hero-rank" id="studentRankInfo">
        <span class="points-rank-badge" id="studentRankBadge">-</span>
        <span class="points-rank-text" id="studentRankText">جاري التحميل...</span>
      </div>
      <div class="points-hero-message" id="pointsMotivation">
        واصل القراءة واكسب المزيد من النقاط! 📚
      </div>
    </div>

    <div class="dashboard-grid">
      <!-- Today's Assignments & Submissions -->
      <section>
        <div class="card" id="todayAssignmentsCard">
          <h3 class="card-title">أوراد القراءة المطلوبة 📖</h3>
          <div id="assignmentsContainer">
            <div class="empty-state">
              <div class="empty-state-icon">⏳</div>
              جاري تحميل أوراد اليوم...
            </div>
          </div>
        </div>
      </section>

      <!-- History of Assignments -->
      <aside>
        <div class="card">
          <h3 class="card-title">سجل قراءاتك السابقة 📚</h3>
          <div class="table-responsive">
            <table style="font-size: 0.9rem;">
              <thead>
                <tr>
                  <th>الكتاب</th>
                  <th>الصفحات</th>
                  <th>التاريخ</th>
                  <th>الحالة</th>
                  <th>النقاط</th>
                </tr>
              </thead>
              <tbody id="historyList">
                <tr>
                  <td colspan="5" class="empty-state">
                    لا توجد أوراد سابقة مسجلة.
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </aside>
    </div>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/student.js"></script>
</body>
</html>
